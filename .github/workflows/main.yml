name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > pr.diff

      - name: AI Review
        run: |
          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4.1-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a strict senior code reviewer. Give concise, clear, and actionable feedback."
                },
                {
                  "role": "user",
                  "content": "Review this pull request diff:\\n\\n'$(cat pr.diff | sed 's/"/\\"/g')'"
                }
              ]
            }')

          echo "$RESPONSE" > review.json

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('review.json', 'utf8'));
            const comment = data.choices[0].message.content;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## 🤖 AI Review\n\n" + comment
            });
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
